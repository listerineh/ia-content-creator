<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
  
  <!-- Video frame mockup -->
  <g transform="translate(700, 100)">
    <!-- Phone frame (vertical video) -->
    <rect x="0" y="0" width="200" height="400" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
    <rect x="10" y="10" width="180" height="380" rx="12" fill="#18181b"/>
    <!-- Play button -->
    <circle cx="100" cy="200" r="30" fill="#7c3aed" opacity="0.9"/>
    <path d="M92 185v30l25-15-25-15z" fill="white"/>
    <!-- Video lines -->
    <rect x="20" y="320" width="160" height="4" rx="2" fill="#3f3f46"/>
    <rect x="20" y="330" width="120" height="4" rx="2" fill="#3f3f46"/>
    <rect x="20" y="340" width="80" height="4" rx="2" fill="#3f3f46"/>
    
    <!-- Second phone (offset) -->
    <g transform="translate(180, 50)" opacity="0.7">
      <rect x="0" y="0" width="180" height="350" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
      <rect x="8" y="8" width="164" height="334" rx="10" fill="#18181b"/>
      <circle cx="90" cy="175" r="25" fill="#a855f7" opacity="0.8"/>
      <path d="M83 162v26l22-13-22-13z" fill="white"/>
    </g>
  </g>
  
  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect width="60" height="60" rx="12" fill="#7c3aed"/>
    <path d="M30 5.6a24.4 24.4 0 0 0-24.4 24.4" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.3"/>
    <path d="M30 54.4a24.4 24.4 0 0 0 24.4-24.4" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.3"/>
    <path d="M30 11.25a18.75 18.75 0 0 0-18.75 18.75" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M30 48.75a18.75 18.75 0 0 0 18.75-18.75" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.5"/>
    <circle cx="30" cy="30" r="11.25" stroke="white" stroke-width="3.75" fill="none"/>
    <path d="M26.25 24.4v11.25l9.4-5.6-9.4-5.65z" fill="white"/>
  </g>
  
  <!-- Title -->
  <text x="160" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#a1a1aa">OpenStage</text>
  
  <!-- Main title -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white">Generador de Clips</text>
  
  <!-- Subtitle -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#71717a">Crea clips virales desde tus videos de conciertos</text>
  
  <!-- Platform badges -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="100" height="40" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
    <text x="50" y="26" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">TikTok</text>
    
    <rect x="120" y="0" width="100" height="40" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
    <text x="170" y="26" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">Reels</text>
    
    <rect x="240" y="0" width="100" height="40" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
    <text x="290" y="26" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">Shorts</text>
    
    <rect x="360" y="0" width="120" height="40" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
    <text x="420" y="26" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">Instagram</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(80, 440)">
    <circle cx="10" cy="10" r="6" fill="#10b981"/>
    <text x="30" y="16" font-family="system-ui, sans-serif" font-size="18" fill="#a1a1aa">Subtítulos automáticos</text>
    
    <circle cx="280" cy="10" r="6" fill="#10b981"/>
    <text x="300" y="16" font-family="system-ui, sans-serif" font-size="18" fill="#a1a1aa">Múltiples formatos</text>
    
    <circle cx="510" cy="10" r="6" fill="#10b981"/>
    <text x="530" y="16" font-family="system-ui, sans-serif" font-size="18" fill="#a1a1aa">100% en tu navegador</text>
  </g>
  
  <!-- URL -->
  <text x="80" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#52525b">openstage.online/tools/clip-generator</text>
</svg>
